<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Afurix Solutions</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="" name="keywords" />
    <meta content="" name="description" />

    <!-- Favicon -->
    <link href="img/africa-2.webp" rel="icon" />

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&family=Work+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Icon Font Stylesheet -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet" />
    <link href="lib/lightbox/css/lightbox.min.css" rel="stylesheet" />
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet" />

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet" />
  </head>

  <body>
    <!-- Spinner Start -->
    <div
      id="spinner"
      class="show bg-dark position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center"
    >
      <div
        class="spinner-grow text-primary"
        style="width: 3rem; height: 3rem"
        role="status"
      >
        <span class="sr-only">Loading...</span>
      </div>
    </div>
    <!-- Spinner End -->

    <!-- Header Start -->
    <div class="container-fluid p-0">
      <div id="navbar"></div>

      <div class="page-header pb-5">
        <div class="container text-center py-5">
          <h1 class="display-4 text-uppercase mb-3 animated slideInDown">
            Contact
          </h1>
          <nav aria-label="breadcrumb animated slideInDown">
            <ol class="breadcrumb justify-content-center text-uppercase mb-0">
              <li class="breadcrumb-item">
                <a class="text-white" href="/">Home</a>
              </li>
              <li
                class="breadcrumb-item text-primary active"
                aria-current="page"
              >
                Contact
              </li>
            </ol>
          </nav>
        </div>
      </div>
    </div>
    <!-- Header End -->

    <!-- Contact Start -->
    <div class="container-fluid py-5">
      <div class="container py-5">
        <div class="row g-5">
          <div class="col-lg-6">
            <div class="title wow fadeInUp" data-wow-delay="0.1s">
              <div class="title-left">
                <h5>Contact</h5>
                <h1>Please Contact Us</h1>
              </div>
            </div>

            <table
              class="table table-dark mb-0 wow fadeInUp"
              data-wow-delay="0.3s"
            >
              <tr>
                <td>PHONE</td>
                <td>+254706551542</td>
              </tr>
              <tr>
                <td>E-MAIL</td>
                <td>afurixsolutions@gmail.com</td>
              </tr>
              <tr>
                <td>ADDRESS</td>
                <td>Kikuyu-Nderi Road, Kikuyu, Kenya</td>
              </tr>
              <!-- <tr class="border-dark">
                <td>FOLLOW US</td>
                <td>
                  <a class="me-1" href="#!"><i class="fab fa-x-twitter"></i></a>
                  <a class="me-1" href="#!"
                    ><i class="fab fa-facebook-f"></i
                  ></a>
                  <a class="me-1" href="#!"><i class="fab fa-youtube"></i></a>
                  <a class="me-1" href="#!"
                    ><i class="fab fa-linkedin-in"></i
                  ></a>
                </td>
              </tr> -->
            </table>
          </div>
          <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.5s">
            <div id="form-status"></div>

            <form id="contact-form">
              <div class="row g-3">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="text"
                      class="form-control bg-secondary border-0"
                      id="contact-name"
                      placeholder="Your Name"
                    />
                    <label for="name">Your Name</label>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="email"
                      class="form-control bg-secondary border-0"
                      id="contact-email"
                      placeholder="Your Email"
                    />
                    <label for="email">Your Email</label>
                  </div>
                </div>
                <div class="col-12">
                  <div class="form-floating">
                    <input
                      type="text"
                      class="form-control bg-secondary border-0"
                      id="contact-subject"
                      placeholder="Subject"
                    />
                    <label for="subject">Subject</label>
                  </div>
                </div>
                <div class="col-12">
                  <div class="form-floating">
                    <textarea
                      class="form-control bg-secondary border-0"
                      placeholder="Leave a message here"
                      id="contact-message"
                      style="height: 150px"
                    ></textarea>
                    <label for="message">Message</label>
                  </div>
                </div>
                <div class="col-12">
                  <button
                    class="btn btn-outline-primary border-2 w-100 py-3"
                    type="submit"
                  >
                    Send Message
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- Contact End -->

    <!-- Google Map Start -->
    <div class="container-fluid p-0 wow fadeIn" data-wow-delay="0.3s">
      <iframe
        src="https://www.google.com/maps?q=-1.2426442,36.6611656&z=17&output=embed"
        frameborder="0"
        allowfullscreen=""
        aria-hidden="false"
        tabindex="0"
        style="
          width: 100%;
          height: 500px;
          /* filter: grayscale(50%) invert(92%) contrast(83%); */
          border: 0;
        "
      ></iframe>
    </div>
    <!-- Google Map End -->

    <!-- Footer Start -->
    <div id="footer"></div>

    <!-- Footer End -->

    <!-- Back to Top -->
    <a
      href="#"
      class="btn btn-outline-primary border-2 btn-lg-square back-to-top"
      ><i class="bi bi-arrow-up"></i
    ></a>

    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="lib/lightbox/js/lightbox.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>
    <script>
      function loadComponent(id, file) {
        fetch(file)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(id).innerHTML = data;
          });
      }

      loadComponent("header", "components/header.html");
    </script>
    <script src="js/main.js"></script>

    <script>
      function loadComponent(id, file) {
        fetch(file)
          .then((response) => response.text())
          .then((data) => {
            document.getElementById(id).innerHTML = data;

            if (id === "navbar") {
              setActiveNav();
            }
          });
      }

      loadComponent("navbar", "components/navbar.html");
      loadComponent("footer", "components/footer.html");
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
      emailjs.init("mCFT8eyaxcNy9-u9u");

      document
        .getElementById("contact-form")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const params = {
            title: document.getElementById("contact-subject").value,
            name: document.getElementById("contact-name").value,
            email: document.getElementById("contact-email").value,
            message: document.getElementById("contact-message").value,
            time: new Date().toLocaleString(),
          };

          emailjs
            .send("service_z2rddy9", "template_my5gtqp", params)
            .then(() => {
              showMessage("Message sent successfully!", "success");
              document.getElementById("contact-form").reset();
            })
            .catch(() => {
              showMessage("Failed to send message. Try again.", "error");
            });
        });
    </script>
    <script>
      function showMessage(message, type) {
        const status = document.getElementById("form-status");

        const alertType = type === "success" ? "alert-success" : "alert-danger";

        status.innerHTML = `<div class="alert ${alertType} mt-3" role="alert">
        ${message}
     </div>`;

        setTimeout(() => {
          status.innerHTML = "";
        }, 5000);
      }
    </script>
  </body>
</html>
